name: Docker Image CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/stream-recorder:${{ github.ref_name }},ghcr.io/${{ github.repository_owner }}/stream-recorder:${{ github.sha }}

      - name: docker stack deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          username: root
          host: ${{ secrets.SSH_KNOWN_HOSTS }}
          key: ${{ secrets.SSH_PRIV_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stack deploy -c ~/devops/hostinger/prod-stack.yaml prod --with-registry-auth
            docker stack deploy -c ~/devops/hostinger/dev-stack.yaml dev --with-registry-auth
            docker image prune -a -f
